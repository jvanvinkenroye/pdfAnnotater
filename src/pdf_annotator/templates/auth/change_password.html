{% extends "base.html" %}

{% block title %}Passwort ändern - PDF Annotator{% endblock %}

{% block content %}
<div class="upload-container">
    <div class="upload-content" style="max-width: 400px;">
        <h1>Passwort ändern</h1>

        {% if error %}
        <div class="flash flash-error" style="margin-bottom: 1.5rem;">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="flash flash-success" style="margin-bottom: 1.5rem;">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="current_password">Aktuelles Passwort</label>
                <input type="password" id="current_password" name="current_password" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label for="new_password">Neues Passwort</label>
                <input type="password" id="new_password" name="new_password" class="form-input" required minlength="8">
            </div>
            <div class="form-group">
                <label for="new_password_confirm">Neues Passwort wiederholen</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" class="form-input" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">Passwort ändern</button>
        </form>
    </div>
</div>
{% endblock %}
