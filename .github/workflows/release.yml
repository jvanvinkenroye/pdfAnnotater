name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ------------------------------------------------------------------
  # 1. GitHub Release anlegen
  # ------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

  # ------------------------------------------------------------------
  # 2. .deb bauen und als Release-Asset hochladen
  # ------------------------------------------------------------------
  build-deb:
    name: Build .deb package
    needs: create-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # Version aus Git-Tag (v0.8.0 → 0.8.0)
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Venv am späteren Installationspfad aufbauen, damit Shebangs stimmen.
      # Wir erstellen das Venv direkt bei /opt/pdf-annotator/.venv mit
      # uv venv + uv export + pip, damit der Pfad im Shebang stimmt.
      - name: Build venv at target path
        run: |
          sudo mkdir -p /opt/pdf-annotator
          sudo chmod 777 /opt/pdf-annotator

          # Venv an Ziel-Pfad anlegen (Shebangs zeigen dann auf /opt/pdf-annotator/.venv)
          uv venv /opt/pdf-annotator/.venv

          # Produktions-Abhängigkeiten exportieren und installieren
          # uv pip install --python vermeidet die Abhängigkeit von pip im Venv
          uv export --frozen --no-dev --no-hashes --format requirements-txt \
            > /tmp/requirements.txt
          uv pip install --quiet --python /opt/pdf-annotator/.venv \
            -r /tmp/requirements.txt

          # Projekt selbst als Wheel bauen und installieren (nicht-editable)
          uv build --wheel --out-dir /tmp/pdf-wheel/
          uv pip install --quiet --python /opt/pdf-annotator/.venv \
            --no-deps /tmp/pdf-wheel/*.whl

          echo "=== Entry point shebang ==="
          head -1 /opt/pdf-annotator/.venv/bin/pdf-annotator

      # Staging-Verzeichnis aufbauen
      - name: Build staging directory
        run: |
          mkdir -p dist/staging/opt/pdf-annotator
          mkdir -p dist/staging/usr/bin

          # Venv + wsgi.py
          cp -a /opt/pdf-annotator/.venv dist/staging/opt/pdf-annotator/.venv
          cp wsgi.py dist/staging/opt/pdf-annotator/wsgi.py

          # Wrapper: Desktop-Launcher (flaskwebgui)
          cat > dist/staging/usr/bin/pdf-annotator << 'EOF'
          #!/usr/bin/env bash
          exec /opt/pdf-annotator/.venv/bin/pdf-annotator "$@"
          EOF
          chmod 755 dist/staging/usr/bin/pdf-annotator

          # Wrapper: Production-Server (Gunicorn)
          cat > dist/staging/usr/bin/pdf-annotator-server << 'EOF'
          #!/usr/bin/env bash
          exec /opt/pdf-annotator/.venv/bin/gunicorn \
              --workers "${WORKERS:-4}" \
              --bind "${BIND:-0.0.0.0:8000}" \
              --chdir /opt/pdf-annotator \
              wsgi:app
          EOF
          chmod 755 dist/staging/usr/bin/pdf-annotator-server

          echo "=== Staging layout (ohne .venv-Internals) ==="
          find dist/staging -not -path '*/.venv/*' | sort

      # .deb mit dpkg-deb bauen (kein nfpm – vermeidet Glob-Probleme mit tiefen Venvs)
      - name: Build .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # DEBIAN-Paketstruktur aufbauen
          mkdir -p dist/deb/DEBIAN
          mkdir -p dist/deb/usr/bin
          mkdir -p dist/deb/lib/systemd/system
          mkdir -p dist/deb/etc/pdf-annotator

          # App + Venv
          cp -a dist/staging/opt dist/deb/

          # Wrapper-Scripts
          cp dist/staging/usr/bin/pdf-annotator      dist/deb/usr/bin/
          cp dist/staging/usr/bin/pdf-annotator-server dist/deb/usr/bin/

          # systemd Unit + Konfig-Template
          cp packaging/pdf-annotator.service dist/deb/lib/systemd/system/
          cp packaging/env.example           dist/deb/etc/pdf-annotator/

          # DEBIAN/control (keine führenden Leerzeichen erlaubt!)
          echo "Package: pdf-annotator"                                   > dist/deb/DEBIAN/control
          echo "Version: ${VERSION}"                                      >> dist/deb/DEBIAN/control
          echo "Architecture: amd64"                                      >> dist/deb/DEBIAN/control
          echo "Maintainer: jvanvinkenroye <java@local.dev>"              >> dist/deb/DEBIAN/control
          echo "Depends: python3 (>= 3.10)"                              >> dist/deb/DEBIAN/control
          echo "Homepage: https://github.com/jvanvinkenroye/pdfAnnotater" >> dist/deb/DEBIAN/control
          echo "Description: PDF annotation tool with side-by-side view"  >> dist/deb/DEBIAN/control
          echo " PDF annotator with green Courier timestamps and Gunicorn." >> dist/deb/DEBIAN/control

          # Maintainer-Scripts
          cp packaging/postinstall.sh dist/deb/DEBIAN/postinst
          cp packaging/preremove.sh   dist/deb/DEBIAN/prerm
          chmod 755 dist/deb/DEBIAN/postinst dist/deb/DEBIAN/prerm

          # Paket bauen
          fakeroot dpkg-deb --build dist/deb \
            "dist/pdf-annotator_${VERSION}_amd64.deb"

          ls -lh dist/*.deb
          dpkg-deb --info "dist/pdf-annotator_${VERSION}_amd64.deb"

      # Als Release-Asset hochladen
      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/pdf-annotator_${{ steps.version.outputs.version }}_amd64.deb"

  # ------------------------------------------------------------------
  # 3. Homebrew-Formel aktualisieren (bisheriger Job)
  # ------------------------------------------------------------------
  update-homebrew-tap:
    name: Update Homebrew tap
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Compute SHA256 of release tarball
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          URL="https://github.com/jvanvinkenroye/pdfAnnotater/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Update formula in homebrew tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ steps.sha.outputs.tag }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          API="repos/jvanvinkenroye/homebrew-pdf-annotator/contents/Formula/pdf-annotator.rb"

          BLOB_SHA=$(gh api "$API" --jq '.sha')
          CURRENT=$(gh api "$API" --jq '.content' | base64 -d)

          UPDATED=$(printf "%s" "$CURRENT" | python3 -c "
          import sys, os, re

          content = sys.stdin.read()
          tag     = os.environ['TAG']
          new_sha = os.environ['NEW_SHA']

          content = re.sub(
              r'(url\s+\"https://github\.com/jvanvinkenroye/pdfAnnotater/archive/refs/tags/)[^\"]+(\\.tar\\.gz\")',
              rf'\g<1>{tag}\g<2>',
              content,
          )
          content = re.sub(
              r'(sha256\s+\")[a-f0-9]{64}(\")',
              rf'\g<1>{new_sha}\g<2>',
              content,
              count=1,
          )
          sys.stdout.write(content)
          ")

          ENCODED=$(printf "%s" "$UPDATED" | base64 -w 0)

          gh api "$API" --method PUT \
            -f message="chore: Update formula to ${TAG}" \
            -f content="${ENCODED}" \
            -f sha="${BLOB_SHA}" \
            --jq '.commit.html_url' \
            | xargs echo "Updated:"
